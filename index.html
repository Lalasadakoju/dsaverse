<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DSA Visualizer</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      overflow-x: hidden;
    }
    header {
      background: #1f1f1f;
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #9c27b0;
      letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(156,39,176,0.7);
    }
    .hero {
      text-align: center;
      padding: 60px 20px;
      background: radial-gradient(circle at center, #673ab7, #0d0d0d);
      color: #fff;
      animation: pulse 6s infinite;
    }
    .hero h1 {
      font-size: 42px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px #9c27b0;
    }
    .hero p {
      font-size: 20px;
      margin-top: 0;
      color: #ddd;
    }
    @keyframes pulse {
      0% { background: radial-gradient(circle at center, #673ab7, #0d0d0d); }
      50% { background: radial-gradient(circle at center, #9c27b0, #0d0d0d); }
      100% { background: radial-gradient(circle at center, #673ab7, #0d0d0d); }
    }
    .options {
      display: flex;
      justify-content: center;
      gap: 60px;
      padding: 80px 20px;
      flex-wrap: wrap;
    }
    .card {
      background: #1e1e1e;
      padding: 50px;
      border-radius: 16px;
      text-align: center;
      font-size: 24px;
      color: #ff9800;
      text-decoration: none;
      transition: 0.4s;
      width: 280px;
      box-shadow: 0 0 25px rgba(156,39,176,0.8);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, #9c27b0, transparent, #673ab7, transparent);
      animation: rotate 6s linear infinite;
      z-index: 0;
    }
    .card span {
      position: relative;
      z-index: 1;
    }
    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .card:hover {
      transform: scale(1.08);
      color: #fff;
      background: #2a2a2a;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #1f1f1f;
      color: #aaa;
      font-size: 14px;
      box-shadow: 0 -2px 10px rgba(156,39,176,0.5);
    }
    @media (max-width: 600px) {
      .hero h1 { font-size: 28px; }
      .card { font-size: 18px; width: 200px; padding: 30px; }
    }
  </style>
</head>
<body>
  <header>✨ DSA Visualizer ✨</header>

  <div class="hero">
    <h1>Welcome to DSA Visualizer</h1>
    <p>Choose your category to explore</p>
  </div>

  <div class="options">
    <a href="linear.html" class="card"><span>📐 Linear Data Structures</span></a>
    <a href="nonlinear.html" class="card"><span>🌳 Non-Linear Data Structures</span></a>
  </div>

  <footer>
    © 2026 DSA Visualizer | Interactive Learning Platform
  </footer>
</body>
</html>
